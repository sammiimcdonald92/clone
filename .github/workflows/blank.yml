# CI workflow with performance optimizations
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Cancel in-progress runs for the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Set a reasonable timeout to prevent runaway jobs
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone for faster checkout when full history isn't needed
          fetch-depth: 1

      # TODO: Add your actual build and test commands below
      - name: Build
        run: echo "Build step placeholder - replace with actual build commands"
